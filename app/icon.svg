<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4d8c"/>
      <stop offset="100%" stop-color="#0a1e3d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <path d="M16 3.5L5 8v9.5c0 6.8 5.2 11.2 11 13.2 5.8-2 11-6.4 11-13.2V8z"
        fill="rgba(0,0,0,0.25)" transform="translate(0.5,1)"/>

  <!-- Shield body -->
  <path d="M16 2L4 7v10.5c0 7 5.5 11.5 12 13.5 6.5-2 12-6.5 12-13.5V7z"
        fill="url(#shield-grad)"/>

  <!-- Shine overlay -->
  <path d="M16 2L4 7v10.5c0 7 5.5 11.5 12 13.5 6.5-2 12-6.5 12-13.5V7z"
        fill="url(#shine)"/>

  <!-- Inner border -->
  <path d="M16 4.5L6 8.8v9.2c0 6 4.7 9.8 10 11.6 5.3-1.8 10-5.6 10-11.6V8.8z"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>

  <!-- Checkmark with glow -->
  <path d="M10.5 16.5l3.5 3.5 7.5-8"
        stroke="rgba(255,255,255,0.3)" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M10.5 16.5l3.5 3.5 7.5-8"
        stroke="white" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#glow)"/>
</svg>
